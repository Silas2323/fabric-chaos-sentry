# NVIDIA Air lab inventory — replace ansible_host values with the OOB mgmt IPs
# of your Air simulation (or the SSH service endpoints Air exposes).
all:
  vars:
    ansible_user: cumulus
    # ansible_password: use a vault or SSH keys; never commit credentials
    ansible_python_interpreter: /usr/bin/python3

  children:
    spines:
      hosts:
        spine01:
          ansible_host: 192.0.2.11   # TODO: replace
        spine02:
          ansible_host: 192.0.2.12   # TODO: replace
    leaves:
      hosts:
        leaf01:
          ansible_host: 192.0.2.21   # TODO: replace
        leaf02:
          ansible_host: 192.0.2.22   # TODO: replace
